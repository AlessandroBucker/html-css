<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Exemplo de Semântica</title>
    <style>
  body {
    background-color: #2b6de7; /* Código Hexadecimal */
    /* Ou use nomes: background-color: lightblue; */
  }
  body {
    background-image: url('favicon.ico');
    background-repeat: no-repeat;  /* Impede a repetição */
    background-size: cover;       /* Ajusta a imagem para cobrir todo o espaço */
    background-position: center;  /* Centraliza a imagem */
    background-attachment: fixed; /* Efeito onde a imagem fica parada ao rolar a página */
  }
</style>

</head>
<body>
    Eu moro na <Address>rua tenete Arytarragâ 3095</Address>


</body>
</html>
