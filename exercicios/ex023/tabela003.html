<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela 003</title>
    <style>
        table{
            font: 1em arial, helvetica, sans-serif;
            width: 300px;
            height:30px;
            border-collapse: collapse;
            position: relative;
            
        }
        td{
            border: 1px solid black;
            padding: 5px;
            text-align: left;
            vertical-align: middle;
            text-align: center;
        }
    </style>
</head>
<body>
    <table>
        <h1>Mesclagem de Células</h1>
        <tr>
            <td>A</td>
            <td colspan="2">B</td>
            
        </tr>
        <tr>
            <td rowspan="3">D</td>
            <td rowspan="1">E</td>
            <td>F</td>
        </tr>
        <tr>
            
            <td>H</td>
            <td>I</td>
        </tr>
        <tr>
            
            <td>L</td>
            <td>M</td>
        </tr>
    </table>
</body>
</html>
