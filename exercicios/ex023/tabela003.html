<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela 003</title>
    <style>
        table{
            width: 500px;
            height:30px;
            border-collapse: collapse;
            position: relative;
        }
        td{
            border: 1px solid black;
            padding: 5px;
            text-align: left;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <table>
        <h1>Mesclagem de Células</h1>
        <tr>
            <td>A</td>
            <td>B</td>
            <td>C</td>
        </tr>
        <tr>
            <td>D</td>
            <td>E</td>
            <td>F</td>
        </tr>
        <tr>
            <td>G</td>
            <td>H</td>
            <td>I</td>
        </tr>
        <tr>
            <td>J</td>
            <td>L</td>
            <td>M</td>
        </tr>
    </table>
</body>
</html>
